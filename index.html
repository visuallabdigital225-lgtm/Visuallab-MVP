<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visuallab | Edilma Tavares</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Arial', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
    }
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      margin-bottom: 30px;
      object-fit: cover;
    }
    h1 {
      font-size: 32px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 15px;
    }
    .destaque {
      color: #a855f7;
    }
    p {
      color: #9ca3af;
      font-size: 16px;
      margin-bottom: 30px;
      max-width: 350px;
    }
    .card {
      background: #1f1f1f;
      border: 1px solid #a855f7;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 14px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      margin-bottom: 15px;
    }
    .btn {
      width: 100%;
      padding: 16px;
      background: #a855f7;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      display: block;
      margin-bottom: 12px;
    }
    .btn-zap {
      background: #25D366;
    }
    .info {
      display: flex;
      justify-content: space-around;
      width: 100%;
      max-width: 400px;
      margin-top: 20px;
      font-size: 14px;
      color: #6b7280;
    }
    .info div { text-align: center; }
    .info strong { 
      display: block; 
      color: #fff; 
      font-size: 18px;
      margin-bottom: 4px;
    }
    footer {
      margin-top: 40px;
      color: #6b7280;
      font-size: 14px;
    }
    footer a { color: #a855f7; text-decoration: none; }
  </style>
</head>
<body>
  
  <img src="COLOQUE_SUA_FOTO_AQUI" alt="Logo Visuallab" class="logo">

  <h1>Transforme seu Instagram<br><span class="destaque">em 30 segundos</span></h1>
  
  <p>Descubra sua nota de impacto visual e receba um plano personalizado para atrair mais clientes em 7 dias</p>

  <div class="card">
    <input type="text" placeholder="@ seuinstagram" value="@tavares.edyh" readonly>
    <a href="https://wa.me/5581991058649?text=Olá! Quero analisar meu Instagram com o Visuallab" class="btn">
      Analisar meu perfil grátis →
    </a>
    <a href="https://wa.me/5581991058649" class="btn btn-zap">
      Falar no WhatsApp
    </a>
  </div>

  <div class="info">
    <div><strong>100%</strong>Seguro</div>
    <div><strong>30s</strong>Análise</div>
    <div><strong>Grátis</strong>Sem senha</div>
  </div>

  <footer>
    © 2024 Visuallab | <a href="https://instagram.com/tavares.edyh">@tavares.edyh</a>
  </footer>

</body>
</html>
